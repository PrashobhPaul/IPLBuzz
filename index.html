<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=DM+Sans:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080c;--s1:#0d0f17;--s2:#141720;--bd:#222840;--bd2:#2c3555;--gold:#f0a500;--red:#e0341a;--green:#1db954;--txt:#dde1ee;--dim:#606880;--dim2:#9099b4}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
nav{display:flex;align-items:center;height:54px;padding:0 16px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;gap:2px}
.brand{font-family:'Teko',sans-serif;font-size:24px;font-weight:700;color:var(--txt);cursor:pointer;margin-right:12px;letter-spacing:-.5px;flex-shrink:0}
.brand b{color:var(--gold)}
.nav-btns{display:flex;gap:2px;flex-shrink:0}
nav button{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim2);background:none;border:none;cursor:pointer;padding:5px 10px;border-radius:4px;transition:.15s;white-space:nowrap}
nav button:hover{color:var(--txt);background:var(--s2)}
nav button.on{color:var(--gold);background:rgba(240,165,0,.1)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}

.api-input:focus{border-color:var(--gold)}
.api-input::placeholder{color:var(--dim)}
.api-save{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1px solid var(-font-family:'Teko',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.3px;line-height:1}
.sh p{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-top:3px}
/* ── LIVE TILE ── */
.live-tile{background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:22px;position:relative;overflow:hidden;transition:border-color .2s}
.live-tile::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}
.live-tile:hover{border-color:var(--bd2)}
.live-tile-header{padding:14px 18px 12px;cursor:pointer;user-select:none}
.live-tag{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.live-scores-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.live-team-score{flex:1;min-width:120px}
.live-tname{font-family:'Teko',sans-serif;font-size:22px;font-weight:700;line-height:1;display:flex;align-items:center;gap:7px}
.tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.live-sc{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--gold);margin-top:2px}
.live-sc small{font-size:12px;color:var(--dim2);font-weight:400;margin-left:2px}
.live-vs{font-family:'Teko',sans-serif;font-size:15px;color:var(--dim);flex-shrink:0}
.live-status-txt{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--dim2);margin-top:8px;line-height:1.4}
.live-expand-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.expand-hint{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:5px}
.expand-arrow{display:inline-block;transition:transform .25s;font-size:10px;color:var(--dim)}
.expand-arrow.open{transform:rotate(180deg)}
.live-footer{display:flex;align-items:center;gap:10px}
.btn-refresh{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);padding:4px 12px;border-radius:4px;cursor:pointer;transition:.15s}
.btn-refresh:hover{background:rgba(240,165,0,.16)}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.last-upd{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--dim)}

/* ── EXPANDED SCORECARD ── */
.live-detail{display:none;border-top:1px solid var(--bd);padding:0 18px 16px}
.live-detail.open{display:block}
.sc-section{margin-top:14px}
.sc-section-title{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.sc-table{width:100%;border-collapse:collapse}
.sc-table th{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:4px 6px;text-align:right}
.sc-table th:first-child{text-align:left}
.sc-table td{font-family:'Barlow Condensed',sans-serif;font-size:13px;padding:5px 6px;text-align:right;border-bottom:1px solid rgba(34,40,64,.6)}
.sc-table td:first-child{text-align:left;color:var(--txt)}
.sc-table tr:last-child td{border-bottom:none}
.sc-name{font-weight:700}
.sc-note{font-size:10px;color:var(--dim);font-weight:400;display:block;margin-top:1px}
.sc-batting{color:var(--gold);font-weight:700}
.sc-balls{color:var(--dim2)}
.sc-highlight{color:var(--green)}
.sc-bowler-w{color:var(--red);font-weight:700}
.balls-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.ball{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Teko',sans-serif;font-size:13px;font-weight:700;flex-shrink:0}
.ball-dot{background:var(--s2);border:1px solid var(--bd);color:var(--dim)}
.ball-run{background:var(--s2);border:1px solid var(--bd2);color:var(--txt)}
.ball-four{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);color:#60a5fa}
.ball-six{background:rgba(240,165,0,.15);border:1px solid rgba(240,165,0,.4);color:var(--gold)}
.ball-wicket{background:rgba(224,52,26,.15);border:1px solid rgba(224,52,26,.4);color:var(--red)}
.ball-wide{background:var(--s2);border:1px solid var(--bd);color:var(--dim);font-size:9px}
.ball-over-sep{width:1px;background:var(--bd);margin:0 2px;height:26px;flex-shrink:0}
.crr-row{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.crr-item{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--dim2)}
.crr-item b{color:var(--txt);font-weight:700}

/* ── API NOTICE ── */
.api-notice-tile{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:22px}
.api-notice{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--dim);line-height:1.7}
.api-notice a{color:var(--gold);text-decoration:none}
.api-notice a:hover{text-decoration:underline}
.live-msg{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--dim2);line-height:1.6}


/* ── MATCH CENTRE ── */
.mc-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:.14s;position:relative;overflow:hidden}
.mc-card:hover{background:var(--s2);border-color:var(--bd2)}
.mc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.mc-card.completed::before{background:var(--green)}
.mc-card.live::before{background:var(--gold)}
.mc-card.upcoming::before{background:var(--bd2)}
.mc-match-no{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.mc-status-badge{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:2px}
.mc-status-badge.completed{background:rgba(29,185,84,.12);color:var(--green);border:1px solid rgba(29,185,84,.25)}
.mc-status-badge.live{background:rgba(240,165,0,.12);color:var(--gold);border:1px solid rgba(240,165,0,.3)}
.mc-status-badge.upcoming{background:var(--s2);color:var(--dim);border:1px solid var(--bd)}
.mc-teams-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.mc-team{flex:1;min-width:120px}
.mc-team-name{font-family:'Teko',sans-serif;font-size:22px;font-weight:700;line-height:1;display:flex;align-items:center;gap:8px}
.mc-score{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--gold);margin-top:3px}
.mc-score.batting{color:var(--txt)}
.mc-vs{font-family:'Teko',sans-serif;font-size:16px;color:var(--dim);flex-shrink:0}
.mc-result{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--dim2);margin-top:10px;line-height:1.4}
.mc-result b{color:var(--gold)}
.mc-venue{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--dim);margin-top:4px}

/* Match Detail */
.md-hero{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px 22px;margin-bottom:20px;position:relative;overflow:hidden}
.md-hero-title{font-family:'Teko',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
.md-scores{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.md-team{flex:1;min-width:130px}
.md-tname{font-family:'Teko',sans-serif;font-size:26px;font-weight:700;line-height:1;display:flex;align-items:center;gap:8px}
.md-score{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--gold);margin-top:4px;letter-spacing:.5px}
.md-score small{font-size:13px;color:var(--dim2);font-weight:400}
.md-vs{font-family:'Teko',sans-serif;font-size:18px;color:var(--dim);flex-shrink:0}
.md-result-bar{background:rgba(29,185,84,.08);border:1px solid rgba(29,185,84,.2);border-radius:6px;padding:10px 14px;margin-top:10px}
.md-result-txt{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--green);letter-spacing:.5px}
.md-meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.md-meta-item{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--dim2);letter-spacing:.5px}
.md-meta-item b{color:var(--txt)}

/* Player of Match section */
.pom-section{background:linear-gradient(135deg,rgba(240,165,0,.1),rgba(240,165,0,.05));border:1px solid rgba(240,165,0,.2);border-radius:8px;padding:14px 16px;margin-top:12px}
.pom-title{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pom-content{display:flex;align-items:center;gap:12px}
.pom-name{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:var(--txt);line-height:1}
.pom-stats{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--dim2);margin-top:2px}

/* Analytics tabs */
.atabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:20px;overflow-x:auto}
.atab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);background:none;border:none;cursor:pointer;padding:10px 14px;border-bottom:2px solid transparent;transition:.14s;white-space:nowrap;flex-shrink:0}
.atab:hover{color:var(--txt)}
.atab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ana-content{display:none}
.ana-content.on{display:block}

/* ── STATS ── */
.stat-section-title{font-family:'Teko',sans-serif;font-size:26px;font-weight:700;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stats-note{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--dim);background:var(--s2);padding:10px 14px;border-radius:6px;border-left:3px solid var(--bd2)}
.stat-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--bd)}
.stat-row:first-child{border-radius:8px 8px 0 0}
.stat-row:last-child{border-bottom:none;border-radius:0 0 8px 8px}
.stat-row:hover{background:var(--s2)}
.stat-rank{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--dim2);width:24px;text-align:center;flex-shrink:0}
.stat-rank.gold{color:var(--gold);background:rgba(240,165,0,.1);border-radius:50%;padding:2px}
.stat-rank.silver{color:#c0c0c0;background:rgba(192,192,192,.1);border-radius:50%;padding:2px}
.stat-rank.bronze{color:#cd7f32;background:rgba(205,127,50,.1);border-radius:50%;padding:2px}
.stat-info{flex:1;min-width:0}
.stat-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--txt)}
.stat-team{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--dim);letter-spacing:.5px}
.stat-bar-bg{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:4px}
.stat-bar-fill{height:100%;border-radius:2px;transition:.3s}
.stat-val{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;line-height:1;text-align:right}
.stat-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--dim2);text-align:right;margin-top:1px}
.stat-logo{width:32px;height:32px;border-radius:50%;object-fit:contain;margin-right:6px}
.stat-logo-fb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#fff;margin-right:6px}

/* ── WORM CHART ── */
.worm-chart-wrap{position:relative;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px;margin-bottom:20px}
.worm-chart-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
.worm-svg{width:100%;height:300px}
.worm-legend{display:flex;gap:16px;margin-top:10px}
.worm-legend-item{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700}
.worm-legend-dot{width:8px;height:8px;border-radius:50%}

/* ── OVER ANALYSIS ── */
.ov-chart-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px;margin-bottom:20px}
.ov-bars{display:flex;align-items:end;gap:2px;height:200px;margin-bottom:14px}
.ov-bar{background:rgba(240,165,0,.3);border-radius:2px 2px 0 0;min-width:12px;position:relative;cursor:pointer;transition:.15s;display:flex;align-items:end;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--txt)}
.ov-bar:hover{background:rgba(240,165,0,.5)}
.ov-bar.has-wicket{background:rgba(224,52,26,.4)}
.ov-bar.has-wicket:hover{background:rgba(224,52,26,.6)}
.ov-bar-label{position:absolute;bottom:-20px;font-size:9px;color:var(--dim)}
.ov-controls{display:flex;gap:8px;margin-bottom:14px}
.ov-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);background:var(--s2);border:1px solid var(--bd);padding:6px 12px;border-radius:4px;cursor:pointer;transition:.14s}
.ov-btn:hover,.ov-btn.on{background:var(--gold);color:#000;border-color:var(--gold)}

/* ── PARTNERSHIPS ── */
.part-list{display:flex;flex-direction:column;gap:8px}
.part-item{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;cursor:pointer;transition:.14s}
.part-item:hover{background:var(--s2);border-color:var(--bd2)}
.part-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.part-wkt{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.part-runs{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:var(--gold)}
.part-players{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--txt)}
.part-details{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--dim2);margin-top:4px}

/* ── PLAYER ANALYSIS ── */
.player-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.player-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;transition:.14s}
.player-card:hover{background:var(--s2);border-color:var(--bd2)}
.player-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.player-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--txt)}
.player-role{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-top:2px}
.player-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.player-stat{text-align:center}
.player-stat-val{font-family:'Teko',sans-serif;font-size:18px;font-weight:700;color:var(--gold);line-height:1}
.player-stat-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* ── KEY MOMENTS ── */
.km-list{display:flex;flex-direction:column;gap:10px}
.km-item{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;border-left:4px solid var(--gold)}
.km-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.km-over{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);background:rgba(240,165,0,.1);padding:2px 8px;border-radius:3px}
.km-icon{font-size:16px}
.km-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);flex:1}
.km-text{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--txt);line-height:1.4}
.km-text small{color:var(--dim2);font-size:11px;display:block;margin-top:2px}

/* Player ratings */
.rating-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.rating-card{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:14px}
.rating-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--txt)}
.rating-role{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:2px}
.rating-bar-wrap{height:6px;background:var(--bd);border-radius:3px;margin-top:6px;overflow:hidden}
.rating-bar{height:100%;border-radius:3px}
.rating-val{font-family:'Teko',sans-serif;font-size:26px;font-weight:700;line-height:1}
.rating-stars{color:var(--gold);font-size:12px;letter-spacing:2px}

/* ── ADS ── */
.ad-wrap{margin-bottom:22px}
.ad-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:8px}
.ad-label span{display:inline-block}
.ad-label::before,.ad-label::after{content:'';flex:1;height:1px;background:var(--bd)}
.ad-banner{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;display:block;text-decoration:none;transition:transform .2s,box-shadow .2s;height:100px}
.ad-banner:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.45)}
.ad-banner-bg{position:absolute;inset:0;width:100%;height:100%}
.ad-banner-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,8,12,.93) 0%,rgba(7,8,12,.55) 55%,rgba(7,8,12,.1) 100%)}
.ad-banner-content{position:absolute;inset:0;display:flex;align-items:center;gap:14px;padding:14px 18px}
.ad-banner-icon{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.15)}
.ad-banner-text{flex:1;min-width:0}

async function loadSeasonDataFromCSVs(){
  try{
    var ver = Date.now();
    var scheduleRows = parseCSV(await fetch('./Schedule.csv?v='+ver, { cache:'no-store' }).then(mustText));
    var pointsRows = parseCSV(await fetch('./Points.csv?v='+ver, { cache:'no-store' }).then(mustText));
    var battingRows = parseCSV(await fetch('./Batting.csv?v='+ver, { cache:'no-store' }).then(optionalText));
    var bowlingRows = parseCSV(await fetch('./Bowling.csv?v='+ver, { cache:'no-store' }).then(optionalText));
    var partRows = parseCSV(await fetch('./Partnerships.csv?v='+ver, { cache:'no-store' }).then(optionalText));
    var fowRows = parseCSV(await fetch('./FOW.csv?v='+ver, { cache:'no-store' }).then(optionalText));

    POINTS = [];
    POINTS = pointsRows.map(function(r){
      return { team:r.team, p:+r.m||0, w:+r.w||0, l:+r.l||0, nr:+r.nr||0, pts:+r.pts||0, nrr:r.nrr||'0.00' };
    });

    var byMatchInningsBat = groupRows(battingRows, ['match_no','innings']);
    var byMatchInningsBowl = groupRows(bowlingRows, ['match_no','innings']);
    var byMatchInningsPart = groupRows(partRows, ['match_no','innings']);
    var byMatchInningsFow = groupRows(fowRows, ['match_no','innings']);

    MATCHES = [];
    MATCHES = scheduleRows.map(function(r){
      var no = +r.no;
      var id = 'm'+no;
      var completed = String(r.completed).toLowerCase()==='true';
      var inn1Team = r.inn1_team || r.t1;
      var inn2Team = r.inn2_team || r.t2;
      return {
        id:id, no:no, date:(r.date||'')+' 2026', venue:r.venue, t1:r.t1, t2:r.t2,
        status: completed ? 'completed' : 'upcoming',
        toss:r.toss||'', result:r.result||'', playerOfMatch:(r.pom||'').split('·')[0].trim(),
        t1score:r.t1score||'', t1ov:r.t1ov||'', t2score:r.t2score||'', t2ov:r.t2ov||'',
        inn1: buildInnings(no, 1, inn1Team, r.t1score, byMatchInningsBat, byMatchInningsBowl, byMatchInningsFow, byMatchInningsPart),
        inn2: buildInnings(no, 2, inn2Team, r.t2score, byMatchInningsBat, byMatchInningsBowl, byMatchInningsFow, byMatchInningsPart)
      };
    });
  }catch(e){
    console.error('CSV load failed. Cannot continue with stale embedded data.', e);
    MATCHES = [];
    POINTS = [];
  }
}
function mustText(res){
  if(!res.ok) throw new Error('Required CSV missing: '+res.url+' ['+res.status+']');
  return res.text();
}
function optionalText(res){
  if(!res.ok) return '';
  return res.text();
}

function parseCSV(text){
  var lines = text.trim().split(/\r?\n/);
  if(!lines.length) return [];
  var headers = splitCSVLine(lines[0]);
  return lines.slice(1).filter(Boolean).map(function(line){
    var cols = splitCSVLine(line), obj = {};
    headers.forEach(function(h,i){ obj[h] = (cols[i]||'').trim(); });
    return obj;
  });
}
function splitCSVLine(line){
  var out=[], cur='', q=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch === '"'){ q = !q; continue; }
    if(ch===',' && !q){ out.push(cur); cur=''; continue; }
    cur += ch;
  }
  out.push(cur);
  return out;
}
function groupRows(rows, keys){
  var map={};
  rows.forEach(function(r){
    var k = keys.map(function(x){ return r[x]; }).join('|');
    if(!map[k]) map[k]=[];
    map[k].push(r);
  });
  return map;
}
function buildInnings(matchNo, inningsNo, team, total, batMap, bowlMap, fowMap, partMap){
  var key = matchNo+'|'+inningsNo;
  return {
    team: team,
    total: total || '',
    batting: (batMap[key]||[]).map(function(r){ return { n:r.player, r:+r.runs||0, b:+r.balls||0, f:+r.fours||0, s:+r.sixes||0, d:r.dismissal||'' }; }),
    bowling: (bowlMap[key]||[]).map(function(r){ return { n:r.player, o:r.overs, r:+r.runs||0, w:+r.wickets||0 }; }),
    fow: (fowMap[key]||[]).map(function(r){ return { wkt:+r.wkt||0, r:+r.runs||0, ov:r.over, bat:r.batsman }; }),
    pships: (partMap[key]||[]).map(function(r){ return { wkt:+r.wkt||0, p1:r.p1, p2:r.p2, r:+r.runs||0, b:+r.balls||0 }; })
  };
}

// ═══ STATS CALCULATION ═══

function buildPlayerStats(){
  var batters = {}, bowlers = {};

  MATCHES.forEach(function(match){
    if(match.status !== 'completed') return;
    [match.inn1, match.inn2].forEach(function(inn){
      if(!inn || !inn.batting) return;
      // Use inn.team directly — t1/t2 may not match batting order (e.g. KKR batted 1st in MI vs KKR)
      var team = inn.team;

      // Batting
      inn.batting.forEach(function(b){
        var key = b.n + '|' + team;
        if(!batters[key]) batters[key] = {name:b.n, team:team, mat:0, inn:0, runs:0, hs:0, hsNo:false, balls:0, fours:0, sixes:0, fifties:0, hundreds:0, notOuts:0, nineties:0};
        var p = batters[key];
        p.inn++;
        p.runs += b.r;
        p.balls += b.b;
        p.fours += b.f;
        p.sixes += b.s;
        var notOut = b.d === 'not out';
        if(notOut) p.notOuts++;
        if(b.r > p.hs){ p.hs = b.r; p.hsNo = notOut; }
        if(b.r >= 100) p.hundreds++;
        else if(b.r >= 50) p.fifties++;
        if(b.r >= 90 && b.r < 100) p.nineties++;
      });

      // Bowling
      if(!inn.bowling) return;
      inn.bowling.forEach(function(b){
        // Bowling team = the other team (not the one currently batting)
        var bowlTeam = (team === match.t1) ? match.t2 : match.t1;
        // Fallback: if inn.team doesn't match t1/t2, derive from inn.team directly
        if(team !== match.t1 && team !== match.t2){
          bowlTeam = team; // shouldn't happen but safe
        }
        var key = b.n + '|' + bowlTeam;
        if(!bowlers[key]) bowlers[key] = {name:b.n, team:bowlTeam, inn:0, wkts:0, runs:0, balls:0, best_w:0, best_r:999, fifers:0, dotBalls:0};
        var p = bowlers[key];
        p.inn++;
        p.wkts += b.w;
        p.runs += b.r;
        // overs to balls
        var ovStr = String(b.o);
        var parts = ovStr.split('.');
        var fullOvs = parseInt(parts[0]);
        var extraBalls = parts[1] ? parseInt(parts[1]) : 0;
        p.balls += fullOvs * 6 + extraBalls;
        if(b.w > p.best_w || (b.w === p.best_w && b.r < p.best_r)){ p.best_w = b.w; p.best_r = b.r; }
        if(b.w >= 5) p.fifers++;
        
        // Calculate dot balls (estimate: total balls - scoring balls)
        // This is an approximation - in real data you'd have ball-by-ball info
        var scoringBalls = Math.min(p.balls, Math.floor(b.r/1.5)); // rough estimate
        p.dotBalls += Math.max(0, (fullOvs * 6 + extraBalls) - scoringBalls);
      });
    });
  });

  // Compute derived stats
  var batArr = Object.values(batters).filter(function(p){ return p.inn > 0; });
  batArr.forEach(function(p){
    var dismissals = p.inn - p.notOuts;
    p.avg = dismissals > 0 ? (p.runs / dismissals).toFixed(2) : (p.runs > 0 ? p.runs + '*' : '0.00');
    p.sr = p.balls > 0 ? ((p.runs / p.balls) * 100).toFixed(2) : '0.00';
  });

  var bowlArr = Object.values(bowlers).filter(function(p){ return p.balls > 0; });
  bowlArr.forEach(function(p){
    var ovsDecimal = Math.floor(p.balls/6) + (p.balls%6)/10;
    p.overs = ovsDecimal.toFixed(1);
    p.econ = p.balls > 0 ? ((p.runs / p.balls) * 6).toFixed(2) : '0.00';
    p.avg = p.wkts > 0 ? (p.runs / p.wkts).toFixed(2) : '—';
    p.bsr = p.wkts > 0 ? (p.balls / p.wkts).toFixed(1) : '—';
    p.best = p.best_w + '/' + p.best_r;
  });

  return {bat: batArr, bowl: bowlArr};
}

// Get Player of the Match awards
function getPlayerOfMatchStats(){
  var pomCount = {};
  MATCHES.forEach(function(m){
    if(m.status === 'completed' && m.playerOfMatch){
      var player = m.playerOfMatch;
      if(!pomCount[player]) pomCount[player] = {name: player, awards: 0, team: '', matches: []};
      pomCount[player].awards++;
      pomCount[player].matches.push('Match ' + m.no);
      
      // Find player's team from match data
      if(m.inn1 && m.inn1.batting){
        var found = m.inn1.batting.find(function(b){ return b.n === player; });
        if(found) pomCount[player].team = m.inn1.team;
      }
      if(!pomCount[player].team && m.inn2 && m.inn2.batting){
        var found = m.inn2.batting.find(function(b){ return b.n === player; });
        if(found) pomCount[player].team = m.inn2.team;
      }
    }
  });
  
  return Object.values(pomCount).sort(function(a,b){ return b.awards - a.awards; });
}

      );

  } else if(cat === 'bat-100s'){
    var s = bat.filter(function(p){return p.hundreds>0;}).slice().sort(function(a,b){return b.hundreds-a.hundreds;});
    if(!s.length){
      html = '<div class="stat-section-title">💯 Most Hundreds</div><div class="stats-note">No centuries scored yet in IPL 2026.</div>';
    } else {
      html = '<div class="stat-section-title">💯 Most Hundreds</div>'+
        batTable(s,
          function(p){return p.hundreds;},
          function(p){return p.runs+' runs · HS '+p.hs+(p.hsNo?'*':'');},
          function(p){return p.hundreds;},
          function(p){return '#22c55e'}
        );
    }

  } else if(cat === 'bat-50s'){
    var s = bat.filter(function(p){return p.fifties>0||p.hundreds>0;}).slice().sort(function(a,b){return (b.fifties+b.hundreds)-(a.fifties+a.hundreds);});
    html = '<div class="stat-section-title">5️⃣0️⃣ Most Fifties</div>'+
      batTable(s,
        function(p){return p.fifties+p.hundreds;},
        function(p){return p.runs+' runs · '+p.hundreds+'×100 '+p.fifties+'×50';},
        function(p){return p.fifties+p.hundreds;},
        function(p){return '#f0a500'}
      );

  } else if(cat === 'bat-4s'){
    var s = bat.slice().sort(function(a,b){return b.fours-a.fours;});
    html = '<div class="stat-section-title">4️⃣ Most Fours</div>'+
      batTable(s,
        function(p){return p.fours;},
        function(p){return p.runs+' runs · SR '+p.sr;},
        function(p){return p.fours;},
        function(p){return '#3b82f6'}
      );

  } else if(cat === 'bat-6s'){
    var s = bat.slice().sort(function(a,b){return b.sixes-a.sixes;});
    html = '<div class="stat-section-title">6️⃣ Most Sixes</div>'+
      batTable(s,
        function(p){return p.sixes;},
        function(p){return p.runs+' runs · SR '+p.sr;},
        function(p){return p.sixes;},
        function(p){return '#e0341a'}
      );

  } else if(cat === 'bowl-wkts'){
    var s = bowl.slice().sort(function(a,b){return b.wkts-a.wkts;});
    html = '<div class="stat-section-title">🎯 Most Wickets (Purple Cap)</div>'+
      bowlTable(s,
        function(p){return p.wkts;},
        function(p){return p.econ+' econ · '+p.best+' best';},
        function(p){return p.wkts;},
        function(p){return '#22c55e'}
      );

  } else if(cat === 'bowl-avg'){
    var s = bowl.filter(function(p){return p.wkts>=1;}).slice().sort(function(a,b){
      return parseFloat(a.avg)-parseFloat(b.avg);
    });
    html = '<div class="stat-section-title">📊 Best Bowling Average</div>'+
      bowlTable(s,
        function(p){return p.avg;},
        function(p){return p.wkts+'W · '+p.runs+'R · '+p.overs+' ov';},
        function(p){return Math.max(0,60-parseFloat(p.avg));},
        function(p){return '#22c55e'}
      );

  } else if(cat === 'bowl-best'){
    var s = bowl.slice().sort(function(a,b){
      return b.best_w!==a.best_w ? b.best_w-a.best_w : a.best_r-b.best_r;
    });
    html = '<div class="stat-section-title">⭐ Best Bowling Figures</div>'+
      bowlTable(s,
        function(p){return p.best;},
        function(p){return p.wkts+'W total · Econ '+p.econ;},
        function(p){return p.best_w*10;},
        function(p){return p.best_w>=4?'#22c55e':p.best_w>=3?'#f0a500':'var(--green)'}
      );

  } else if(cat === 'bowl-5w'){
    var s = bowl.filter(function(p){return p.fifers>0;}).slice().sort(function(a,b){return b.fifers-a.fifers;});
    if(!s.length){
      html = '<div class="stat-section-title">🏆 Most 5-Wicket Hauls</div><div class="stats-note">No 5-wicket hauls yet in IPL 2026.</div>';
    } else {
      html = '<div class="stat-section-title">🏆 Most 5-Wicket Hauls</div>'+
        bowlTable(s,
          function(p){return p.fifers;},
          function(p){return p.wkts+'W total · '+p.best+' best';},
          function(p){return p.fifers;},
          function(p){return '#22c55e'}
        );
    }

  } else if(cat === 'bowl-econ'){
    var s = bowl.filter(function(p){return p.balls>=12;}).slice().sort(function(a,b){
      return parseFloat(a.econ)-parseFloat(b.econ);
    });
    html = '<div class="stat-section-title">💰 Best Economy (min 2 overs)</div>'+
      bowlTable(s,
        function(p){return p.econ;},
        function(p){return p.overs+' ov · '+p.wkts+'W · '+p.runs+'R';},
        function(p){return Math.max(0,20-parseFloat(p.econ));},
        function(p){
          var e=parseFloat(p.econ);
          return e<=7?'#22c55e':e<=9?'#f0a500':'var(--gold)';
        }
      );

  } else if(cat === 'bowl-sr'){
    var s = bowl.filter(function(p){return p.wkts>=1;}).slice().sort(function(a,b){
      return parseFloat(a.bsr)-parseFloat(b.bsr);
    });
    html = '<div class="stat-section-title">⚡ Best Bowling Strike Rate (lower is better)</div>'+
      bowlTable(s,
        function(p){return p.bsr;},
        function(p){return p.wkts+'W · '+p.balls+' balls · '+p.overs+' ov';},
        function(p){return p.wkts>=1 ? Math.max(0,80-parseFloat(p.bsr)) : 0;},
        function(p){return '#22c55e'}
      );

  } else if(cat === 'bowl-dots'){
    var s = bowl.slice().sort(function(a,b){return b.dotBalls-a.dotBalls;});
    html = '<div class="stat-section-title">⚫ Most Dot Balls Bowled</div>'+
      bowlTable(s,
        function(p){return p.dotBalls;},
        function(p){return p.overs+' ov · '+p.wkts+'W · Econ '+p.econ;},
        function(p){return p.dotBalls;},
        function(p){return '#6b7280'}
      );

  } else if(cat === 'pom-awards'){
    var pomStats = getPlayerOfMatchStats();
    html = '<div class="stat-section-title">🏆 Most Player of Match Awards</div>';
    html += pomTable(pomStats);
  }

  el.innerHTML = html + note;
}

function getPlayerTeam(match, playerName){
  if(match.inn1 && match.inn1.batting){
    var found = match.inn1.batting.find(function(b){ return b.n === playerName; });
    if(found) return match.inn1.team;
  }
  if(match.inn2 && match.inn2.batting){
    var found = match.inn2.batting.find(function(b){ return b.n === playerName; });
    if(found) return match.inn2.team;
  }
  return '';
}

function getPlayerMatchStats(match, playerName){
  // Look for batting stats
  if(match.inn1 && match.inn1.batting){
    var bat = match.inn1.batting.find(function(b){ return b.n === playerName; });
    if(bat) {
      var sr = bat.b > 0 ? ((bat.r / bat.b) * 100).toFixed(1) : '0.0';
      return bat.r + (bat.d === 'not out' ? '*' : '') + '(' + bat.b + ') · SR ' + sr + ' · ' + bat.f + '×4 ' + bat.s + '×6';
    }
  }
  if(match.inn2 && match.inn2.batting){
    var bat = match.inn2.batting.find(function(b){ return b.n === playerName; });
    if(bat) {
      var sr = bat.b > 0 ? ((bat.r / bat.b) * 100).toFixed(1) : '0.0';
      return bat.r + (bat.d === 'not out' ? '*' : '') + '(' + bat.b + ') · SR ' + sr + ' · ' + bat.f + '×4 ' + bat.s + '×6';
    }
  }
  
  // Look for bowling stats
  if(match.inn1 && match.inn1.bowling){
    var bowl = match.inn1.bowling.find(function(b){ return b.n === playerName; });
    if(bowl) return bowl.w + '/' + bowl.r + ' in ' + bowl.o + ' ov';
  }
  if(match.inn2 && match.inn2.bowling){
    var bowl = match.inn2.bowling.find(function(b){ return b.n === playerName; });
    if(bowl) return bowl.w + '/' + bowl.r + ' in ' + bowl.o + ' ov';
  }
  
  return 'Outstanding performance';
}

function switchMatchTab(tab, btn, matchId){
  document.querySelectorAll('.atab').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  
  var match = MATCHES.find(function(m){ return m.id === matchId; });
  if(!match) return;
  
  var el = document.getElementById('match-analytics');
  if(!el) return;
  
  var html = '';
  
  if(tab === 'scorecard') {
    html = renderScorecard(match);
  } else if(tab === 'worm') {
    html = renderWormChart(match);
  } else if(tab === 'overs') {
    html = renderOverAnalysis(match);
  } else if(tab === 'partnerships') {
    html = renderPartnerships(match);
  } else if(tab === 'players') {
    html = renderPlayerAnalysis(match);
  } else if(tab === 'moments') {
    html = renderKeyMoments(match);
  }
  
  el.innerHTML = html;
}

function renderWormChart(match){
  if(!match.inn1 || !match.inn2 || !match.inn1.overR || !match.inn2.overR){
    return '<div class="stats-note">Worm chart will appear when over-by-over feed is available for this match.</div>';
  }
  // Simple worm chart implementation
  var html = '<div class="worm-chart-wrap">' +
    '<div class="worm-chart-title">Run Rate Progression</div>' +
    '<svg class="worm-svg" viewBox="0 0 400 200">' +
      '<defs><linearGradient id="wormGrad" x1="0%" y1="0%" x2="100%" y2="0%">' +
        '<stop offset="0%" style="stop-color:'+(TEAMS[match.inn1.team]?TEAMS[match.inn1.team].color:'#f0a500')+';stop-opacity:1" />' +
        '<stop offset="100%" style="stop-color:'+(TEAMS[match.inn2.team]?TEAMS[match.inn2.team].color:'#22c55e')+';stop-opacity:1" />' +
      '</linearGradient></defs>';
  
  // Draw the worm lines based on overR data
  if(match.inn1.overR) {
    var points1 = [];
    var cumRuns = 0;
    match.inn1.overR.forEach(function(runs, i){
      cumRuns += runs;
      var x = (i / 19) * 380 + 10;
      var y = 180 - (cumRuns / 250) * 160;
      points1.push(x + ',' + y);
    });
    html += '<polyline fill="none" stroke="'+(TEAMS[match.inn1.team]?TEAMS[match.inn1.team].color:'#f0a500')+'" stroke-width="2" points="'+points1.join(' ')+'"/>';
  }
  
  if(match.inn2.overR) {
    var points2 = [];
    var cumRuns = 0;
    match.inn2.overR.forEach(function(runs, i){
      cumRuns += runs;
      var x = (i / 19) * 380 + 10;
      var y = 180 - (cumRuns / 250) * 160;
      points2.push(x + ',' + y);
    });
    html += '<polyline fill="none" stroke="'+(TEAMS[match.inn2.team]?TEAMS[match.inn2.team].color:'#22c55e')+'" stroke-width="2" points="'+points2.join(' ')+'"/>';
  }
  
  html += '</svg>' +
    '<div class="worm-legend">' +
      '<div class="worm-legend-item">' +
        '<div class="worm-legend-dot" style="background:'+(TEAMS[match.inn1.team]?TEAMS[match.inn1.team].color:'#f0a500')+'"></div>' +
        match.inn1.team +
      '</div>' +
      '<div class="worm-legend-item">' +
        '<div class="worm-legend-dot" style="background:'+(TEAMS[match.inn2.team]?TEAMS[match.inn2.team].color:'#22c55e')+'"></div>' +
        match.inn2.team +
      '</div>' +
    '</div>' +
  '</div>';
  
  return html;
}

function renderOverAnalysis(match){
  if(!match.inn1 || !match.inn2 || !match.inn1.overR || !match.inn2.overR){
    return '<div class="stats-note">Over analysis will appear when over-by-over feed is available for this match.</div>';
  }
  var activeInn = 0;
  var html = '<div class="ov-chart-wrap">' +
    '<div class="ov-controls">' +
      '<button class="ov-btn on" onclick="switchOverView(0,this,\''+match.id+'\')">'+match.inn1.team+' Innings</button>' +
      '<button class="ov-btn" onclick="switchOverView(1,this,\''+match.id+'\')">'+match.inn2.team+' Innings</button>' +
    '</div>' +
    '<div id="over-chart-content"></div>' +
  '</div>';
  
  setTimeout(function(){ switchOverView(0, document.querySelector('.ov-btn.on'), match.id); }, 100);
  
  return html;
}

function switchOverView(innIndex, btn, matchId){
  document.querySelectorAll('.ov-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  
  var match = MATCHES.find(function(m){ return m.id === matchId; });
  var inn = innIndex === 0 ? match.inn1 : match.inn2;
  
  var html = '<div class="ov-bars">';
  
  if(inn.overR) {
    var maxRuns = Math.max.apply(Math, inn.overR);
    inn.overR.forEach(function(runs, i){
      var height = (runs / maxRuns) * 180;
      var hasWicket = inn.overW && inn.overW[i] > 0;
      html += '<div class="ov-bar '+(hasWicket?'has-wicket':'')+'" style="height:'+height+'px" title="Over '+(i+1)+': '+runs+' runs'+(hasWicket?' · '+inn.overW[i]+' wicket(s)':'')+'">' +
        runs +
        '<div class="ov-bar-label">'+(i+1)+'</div>' +
      '</div>';
    });
  }
  
  html += '</div>';
  
  document.getElementById('over-chart-content').innerHTML = html;
}

function renderPartnerships(match){
  if((!match.inn1 || !match.inn1.pships || !match.inn1.pships.length) && (!match.inn2 || !match.inn2.pships || !match.inn2.pships.length)){
    return '<div class="stats-note">Partnership data not available for this match yet.</div>';
  }
  var html = '<div class="part-list">';
  
  [match.inn1, match.inn2].forEach(function(inn){

    var team = TEAMS[inn.team];

    inn.pships.forEach(function(p){
      var rr = p.b > 0 ? ((p.r / p.b) * 6).toFixed(1) : '0.0';
      html += '<div class="part-item">' +
        '<div class="part-header">' +
          '<div class="part-wkt">'+p.wkt+' Wicket Partnership</div>' +
          '<div class="part-runs">'+p.r+'</div>' +
        '</div>' +
        '<div class="part-players">'+p.p1+' & '+p.p2+'</div>' +

      '</div>';
    });
  });
  
  html += '</div>';
  return html;
}

// Global error handler for player photos
window._pImgErr = function(img, playerName, teamCode){
  var team = TEAMS[teamCode];
  var initials = playerName.split(' ').map(function(n){ return n[0]; }).join('').toUpperCase().slice(0,2);
  var fallback = document.createElement('div');
  fallback.className = 'player-avatar-fallback';
  fallback.style.background = team ? team.color : '#888';
  fallback.style.width = img.style.width || img.width + 'px';
  fallback.style.height = img.style.height || img.height + 'px';
  fallback.textContent = initials;
  img.parentNode.replaceChild(fallback, img);
};

function playerPhoto(playerName, teamCode, size, extraStyle){
  size = size || 32;
  extraStyle = extraStyle || '';
  var safeName = playerName.replace(/[^a-zA-Z0-9]/g, '_');
  return '<img class="pimg" src="players/' + safeName + '.jpg" ' +
    'style="width:' + size + 'px;height:' + size + 'px;' + extraStyle + '" ' +
    'onerror="_pImgErr(this, \'' + playerName + '\', \'' + teamCode + '\')" ' +
    'alt="' + playerName + '">';
}

// ═══ CHATBOT SYSTEM ═══

async function sendChatMessage(){
  var input = document.getElementById('chat-input');
  var message = input.value.trim();
  if(!message) return;
  
  input.value = '';
  chatHistory.push({role: 'user', content: message});
  renderChatMessages();
  
  // Show typing
  var typing = document.getElementById('chat-typing');
  if(typing) typing.style.display = 'flex';
  
  try {
    // Prepare context about IPL data
    var context = {
      matches: MATCHES.filter(function(m){ return m.status === 'completed'; }).map(function(m){
        return {
          id: m.id,
          no: m.no,
          teams: [m.t1, m.t2],
          result: m.result,
          playerOfMatch: m.playerOfMatch,
          date: m.date,
          venue: m.venue
        };
      }),
      stats: buildPlayerStats(),
      points: POINTS,
      pomStats: getPlayerOfMatchStats()
    };
    
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [
          {
            role: 'user',
            content: `You are IPLBuzz Bot, an AI cricket analyst for IPL 2026. You have access to match data, player statistics, and points table.

Current IPL 2026 Data:
${JSON.stringify(context, null, 2)}

Answer this question about IPL 2026: ${message}

Keep responses concise and engaging. Use cricket terminology and be enthusiastic about the game. If asking about specific stats, provide exact numbers from the data.`
          }
        ]
      })
    });
    
    if(typing) typing.style.display = 'none';
    
    if(!response.ok) {
      throw new Error('API request failed');
    }
    
    var data = await response.json();
    var botResponse = data.content && data.content[0] ? data.content[0].text : 'Sorry, I encountered an error processing your request.';
    
    chatHistory.push({role: 'assistant', content: botResponse});
    renderChatMessages();
    
  } catch(error) {
    if(typing) typing.style.display = 'none';
    chatHistory.push({
      role: 'assistant', 
      content: 'Sorry, I\'m having trouble connecting right now. But I can tell you that based on the completed matches:\n\n• RCB and MI are leading with 2 points each\n• Virat Kohli leads the Orange Cap race with 69 runs\n• Jacob Duffy (RCB) and Shardul Thakur (MI) are the top wicket-takers\n\nTry asking me about specific match details or player performances!'
    });
    renderChatMessages();
  }
}

function renderChatMessages(){
  var box = document.getElementById('chat-messages');
  if(!box) return;
  box.innerHTML = chatHistory.map(function(m){
    var isUser = m.role==='user';
    return '<div style="display:flex;justify-content:'+(isUser?'flex-end':'flex-start')+';margin-bottom:10px">'+
      '<div style="max-width:82%;padding:10px 13px;border-radius:'+(isUser?'14px 14px 3px 14px':'14px 14px 14px 3px')+';'+
        'background:'+(isUser?'var(--gold)':'var(--s2)')+';'+
        'color:'+(isUser?'#000':'var(--txt)')+';'+
        'font-family:Barlow Condensed,sans-serif;font-size:14px;line-height:1.6;white-space:pre-wrap">'+
        m.content+
      '</div>'+
    '</div>';
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function toggleChat(){
  chatOpen = !chatOpen;
  var panel = document.getElementById('chat-panel');
  var btn   = document.getElementById('chat-fab');
  if(panel){
    panel.style.display = chatOpen ? 'flex' : 'none';
    if(chatOpen && chatHistory.length===0){
      // Send welcome
      chatHistory.push({
        role:'assistant',
        content: '🏏 Hey! I\'m IPLBuzz Bot — your AI cricket analyst.\n\nAsk me anything about IPL 2026:\n• "How did RCB win Match 1?"\n• "Who\'s leading the Orange Cap?"\n• "Predict the winner of tonight\'s match"\n• "Compare Kohli and Kishan\'s innings"\n• "What does SRH need to do to qualify?"'
      });
      renderChatMessages();
    }
  }
  if(btn) btn.innerHTML = chatOpen ? '✕' : '🏏';
}

function chatKeyDown(e){
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    sendChatMessage();
  }
}

// Quick prompt chips
function quickChat(msg){
  var input = document.getElementById('chat-input');
  if(input){ input.value = msg; sendChatMessage(); }
}

function preloadHeavyAssets(){

    './Squads.csv','./Partnerships.csv','./FOW.csv'
  ];
  urls.forEach(function(url){
    fetch(url, { cache: 'force-cache' }).catch(function(){});
  });
}
